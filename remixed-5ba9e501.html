<!DOCTYPE html>
<html lang="si">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Happy Birthday</title>
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Playfair+Display:ital@0;1&family=Lato:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --rose: #e8476a;
    --peach: #f9a87e;
    --blush: #fde8f0;
    --gold: #d4a853;
    --cream: #fff9f3;
    --deep: #2d1b2e;
  }

  html, body {
    width: 100%; height: 100%;
    overflow-x: hidden;
    background: var(--deep);
  }

  body {
    font-family: 'Lato', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    position: relative;
  }

  /* ── Petal Canvas ── */
  #petalCanvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 10;
  }

  /* ── Background gradient ── */
  .bg {
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 50% 0%, #4a1535 0%, transparent 70%),
      radial-gradient(ellipse 60% 40% at 20% 80%, #2a0e1e 0%, transparent 60%),
      linear-gradient(160deg, #1a0d1e 0%, #2d1228 50%, #1c1030 100%);
    z-index: 0;
  }

  /* ── Card ── */
  .card {
    position: relative;
    z-index: 20;
    width: min(92vw, 420px);
    margin: 28px auto 40px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
    opacity: 0;
    animation: cardIn 1.2s cubic-bezier(.22,1,.36,1) 0.6s forwards;
  }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(40px) scale(0.95); }
    to   { opacity: 1; transform: translateY(0)    scale(1); }
  }

  /* ── Top flower crown ── */
  .flower-crown {
    font-size: clamp(1.6rem, 6vw, 2rem);
    letter-spacing: 6px;
    opacity: 0;
    animation: fadeUp 0.8s ease 1.4s forwards;
    filter: drop-shadow(0 0 8px rgba(232,71,106,0.6));
  }

  /* ── Photo frame ── */
  .photo-wrap {
    position: relative;
    margin: 18px 0 0;
    opacity: 0;
    animation: fadeUp 0.9s ease 1.6s forwards;
  }

  .photo-frame {
    width: clamp(170px, 46vw, 210px);
    height: clamp(170px, 46vw, 210px);
    border-radius: 50%;
    border: 4px solid transparent;
    background:
      linear-gradient(var(--deep), var(--deep)) padding-box,
      linear-gradient(135deg, var(--gold), var(--rose), var(--peach), var(--gold)) border-box;
    display: flex; align-items: center; justify-content: center;
    position: relative;
    box-shadow:
      0 0 30px rgba(232,71,106,0.35),
      0 0 60px rgba(232,71,106,0.15),
      inset 0 0 20px rgba(232,71,106,0.08);
    animation: pulseGlow 3s ease-in-out 2.5s infinite;
  }

  @keyframes pulseGlow {
    0%, 100% { box-shadow: 0 0 30px rgba(232,71,106,0.35), 0 0 60px rgba(232,71,106,0.15); }
    50%       { box-shadow: 0 0 45px rgba(232,71,106,0.55), 0 0 90px rgba(232,71,106,0.25); }
  }

  .photo-frame img,
  .photo-frame .photo-placeholder {
    width: calc(100% - 10px);
    height: calc(100% - 10px);
    border-radius: 50%;
    object-fit: cover;
  }

  .photo-placeholder {
    background: linear-gradient(135deg, #3d1a2e, #5a1f40);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 8px;
    color: rgba(253,232,240,0.5);
    font-size: 0.75rem;
    letter-spacing: 1px;
    text-align: center;
    padding: 12px;
  }

  .photo-placeholder svg {
    width: 42px; height: 42px;
    opacity: 0.4;
  }

  /* tiny floating flowers around photo */
  .orbit {
    position: absolute;
    inset: -12px;
    border-radius: 50%;
    animation: spin 12s linear infinite;
  }

  .orbit-dot {
    position: absolute;
    font-size: 1.1rem;
    filter: drop-shadow(0 0 4px rgba(232,71,106,0.8));
  }

  .orbit-dot:nth-child(1) { top: 0;   left: 50%; transform: translate(-50%, -50%); }
  .orbit-dot:nth-child(2) { top: 50%; right: 0;  transform: translate(50%, -50%); }
  .orbit-dot:nth-child(3) { bottom: 0; left: 50%; transform: translate(-50%, 50%); }
  .orbit-dot:nth-child(4) { top: 50%; left: 0;  transform: translate(-50%, -50%); }

  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

  /* ── Name tag ── */
  .name-tag {
    margin-top: 22px;
    text-align: center;
    opacity: 0;
    animation: fadeUp 0.9s ease 1.9s forwards;
  }

  .name-tag .label {
    font-family: 'Lato', sans-serif;
    font-weight: 300;
    font-size: clamp(0.65rem, 2.5vw, 0.75rem);
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--peach);
    opacity: 0.75;
  }

  .name-tag .name {
    font-family: 'Dancing Script', cursive;
    font-size: clamp(2.2rem, 9vw, 3rem);
    color: #fff;
    line-height: 1.1;
    text-shadow:
      0 0 20px rgba(249,168,126,0.6),
      0 2px 8px rgba(0,0,0,0.4);
    margin-top: 2px;
  }

  /* ── Birthday headline ── */
  .hb-line {
    margin-top: 20px;
    text-align: center;
    opacity: 0;
    animation: fadeUp 0.9s ease 2.1s forwards;
  }

  .hb-line .hb-text {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: clamp(1.05rem, 4.5vw, 1.35rem);
    color: var(--gold);
    letter-spacing: 2px;
  }

  .hb-line .hb-emoji {
    font-size: clamp(1.4rem, 5vw, 1.7rem);
    vertical-align: middle;
  }

  /* ── Divider ── */
  .divider {
    width: 80%;
    height: 1px;
    margin: 18px auto;
    background: linear-gradient(90deg, transparent, var(--rose), var(--gold), var(--rose), transparent);
    opacity: 0;
    animation: fadeIn 0.8s ease 2.3s forwards;
  }

  /* ── Wish text ── */
  .wish {
    width: 90%;
    text-align: center;
    color: rgba(253,232,240,0.85);
    font-size: clamp(0.85rem, 3.4vw, 1rem);
    line-height: 1.8;
    font-weight: 300;
    letter-spacing: 0.3px;
    opacity: 0;
    animation: fadeUp 1s ease 2.5s forwards;
    padding: 0 4px;
  }

  /* ── Bottom signature ── */
  .from-line {
    margin-top: 22px;
    text-align: center;
    opacity: 0;
    animation: fadeUp 0.9s ease 2.8s forwards;
  }

  .from-line .from-label {
    font-size: 0.7rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: rgba(253,232,240,0.4);
  }

  .from-line .from-name {
    font-family: 'Dancing Script', cursive;
    font-size: clamp(1.3rem, 5vw, 1.6rem);
    color: var(--peach);
    text-shadow: 0 0 12px rgba(249,168,126,0.5);
  }

  /* ── Bottom roses ── */
  .bottom-crown {
    font-size: clamp(1.4rem, 5vw, 1.7rem);
    letter-spacing: 4px;
    margin-top: 10px;
    opacity: 0;
    animation: fadeIn 1s ease 3s forwards;
    filter: drop-shadow(0 0 6px rgba(232,71,106,0.5));
  }

  /* ── Floating sparkles ── */
  .sparkle {
    position: fixed;
    pointer-events: none;
    z-index: 5;
    font-size: 0.9rem;
    animation: floatSpark linear infinite;
    opacity: 0;
  }

  @keyframes floatSpark {
    0%   { transform: translateY(0) rotate(0deg);   opacity: 0; }
    10%  { opacity: 0.7; }
    90%  { opacity: 0.4; }
    100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  /* ── Upload hint ── */
  .upload-hint {
    position: relative;
    z-index: 30;
    margin: 0 auto 20px;
    padding: 10px 20px;
    background: rgba(232,71,106,0.15);
    border: 1px solid rgba(232,71,106,0.3);
    border-radius: 30px;
    color: rgba(253,232,240,0.7);
    font-size: 0.72rem;
    letter-spacing: 1px;
    text-align: center;
    cursor: pointer;
    width: min(88vw, 340px);
    animation: fadeIn 1s ease 3.2s both;
    transition: background 0.3s;
  }

  .upload-hint:hover { background: rgba(232,71,106,0.25); }

  #photoInput { display: none; }
</style>
</head>
<body>

<div class="bg"></div>
<canvas id="petalCanvas"></canvas>

<!-- Hidden file input -->
<input type="file" id="photoInput" accept="image/*">

<div class="card">

  <div class="flower-crown">🌸 🌺 🌸 🌺 🌸</div>

  <div class="photo-wrap">
    <div class="orbit">
      <span class="orbit-dot">🌸</span>
      <span class="orbit-dot">✨</span>
      <span class="orbit-dot">🌺</span>
      <span class="orbit-dot">✨</span>
    </div>
    <div class="photo-frame" id="photoFrame">
      <div class="photo-placeholder" id="placeholder">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
          <circle cx="12" cy="8" r="4"/>
          <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
        </svg>
        <span>Photo<br>Add karanna<br>click karanna</span>
      </div>
    </div>
  </div>

  <div class="name-tag">
    <div class="label">✦ Happy Birthday ✦</div>
    <div class="name" id="birthdayName">Kavindi</div>
  </div>

  <div class="hb-line">
    <span class="hb-emoji">🎂</span>
    <span class="hb-text"> ආදරණීය ජන්ම දිනය </span>
    <span class="hb-emoji">🎂</span>
  </div>

  <div class="divider"></div>

  <p class="wish">
    ජීවිතයේ සෑම හෙළ දිනකම සතුටින් බබලේවා 🌸<br>
    ඔබේ සිහිනවල මල් සදා පිපේවා 🌺<br>
    ඔබ හඬා සතුට, සෙනේ, ජය ලාභ ද<br>
    සෑම ලෙසකින්ම ඔබ ජය ගනිත්වා ✨
  </p>

  <div class="from-line">
    <div class="from-label">with love from</div>
    <div class="from-name" id="fromName">Amara</div>
  </div>

  <div class="bottom-crown">🌺 🌸 🌺 🌸 🌺</div>

</div>

<!-- Upload button -->
<label class="upload-hint" for="photoInput">
  📷 &nbsp; Photo Change karanna — Click here
</label>

<script>
// ── Photo upload ──
document.getElementById('photoInput').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    const frame = document.getElementById('photoFrame');
    frame.innerHTML = `<img src="${ev.target.result}" alt="Birthday person">`;
    frame.style.background =
      'linear-gradient(var(--deep),var(--deep)) padding-box, linear-gradient(135deg,var(--gold),var(--rose),var(--peach),var(--gold)) border-box';
  };
  reader.readAsDataURL(file);
});

// ── Petal explosion on load ──
const canvas = document.getElementById('petalCanvas');
const ctx = canvas.getContext('2d');

function resize() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

const COLORS = ['#e8476a','#f9a87e','#fde8f0','#d4a853','#f06090','#ffc0cb'];
const SHAPES = ['🌸','🌺','🌼','✨','🪷'];

class Petal {
  constructor(burst) {
    this.reset(burst);
  }
  reset(burst) {
    this.x = burst
      ? canvas.width / 2 + (Math.random() - 0.5) * canvas.width * 0.6
      : Math.random() * canvas.width;
    this.y = burst ? canvas.height * 0.3 + (Math.random() - 0.5) * 200 : -20;
    this.vy = 0.6 + Math.random() * 1.8;
    this.vx = (Math.random() - 0.5) * (burst ? 6 : 1.5);
    this.vy += burst ? Math.random() * 3 : 0;
    this.rot = Math.random() * Math.PI * 2;
    this.rotV = (Math.random() - 0.5) * 0.08;
    this.size = 10 + Math.random() * 14;
    this.alpha = 0;
    this.alphaTarget = 0.6 + Math.random() * 0.4;
    this.alphaFade = 0.012 + Math.random() * 0.008;
    this.color = COLORS[Math.floor(Math.random() * COLORS.length)];
    this.shape = SHAPES[Math.floor(Math.random() * SHAPES.length)];
    this.useEmoji = Math.random() > 0.5;
    this.swing = Math.random() * Math.PI * 2;
    this.swingSpeed = 0.015 + Math.random() * 0.02;
    this.dead = false;
    this.burst = burst || false;
  }
  update() {
    this.swing += this.swingSpeed;
    this.x  += this.vx + Math.sin(this.swing) * 0.5;
    this.y  += this.vy;
    this.rot += this.rotV;
    if (this.alpha < this.alphaTarget) this.alpha = Math.min(this.alpha + 0.04, this.alphaTarget);
    if (this.y > canvas.height + 30) { this.dead = true; }
  }
  draw() {
    ctx.save();
    ctx.globalAlpha = this.alpha;
    ctx.translate(this.x, this.y);
    ctx.rotate(this.rot);
    if (this.useEmoji) {
      ctx.font = `${this.size}px serif`;
      ctx.fillText(this.shape, -this.size/2, this.size/2);
    } else {
      ctx.fillStyle = this.color;
      ctx.beginPath();
      // simple ellipse petal
      ctx.ellipse(0, 0, this.size * 0.35, this.size * 0.7, 0, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }
}

let petals = [];

// burst on load
function burst() {
  for (let i = 0; i < 80; i++) {
    setTimeout(() => petals.push(new Petal(true)), i * 18);
  }
}

setTimeout(burst, 800);

// continuous gentle fall
setInterval(() => {
  if (petals.length < 60) petals.push(new Petal(false));
}, 220);

function loop() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  petals = petals.filter(p => !p.dead);
  petals.forEach(p => { p.update(); p.draw(); });
  requestAnimationFrame(loop);
}
loop();

// ── Sparkle dots ──
function addSparkle() {
  const s = document.createElement('div');
  s.className = 'sparkle';
  s.textContent = ['✨','⭐','💫','🌟'][Math.floor(Math.random()*4)];
  s.style.left = Math.random() * 100 + 'vw';
  s.style.top  = 100 + Math.random() * 20 + 'vh';
  s.style.animationDuration = (6 + Math.random() * 8) + 's';
  s.style.animationDelay   = (Math.random() * 4) + 's';
  s.style.fontSize = (0.7 + Math.random() * 0.7) + 'rem';
  document.body.appendChild(s);
  setTimeout(() => s.remove(), 14000);
}

setInterval(addSparkle, 1200);
</script>
</body>
</html>
